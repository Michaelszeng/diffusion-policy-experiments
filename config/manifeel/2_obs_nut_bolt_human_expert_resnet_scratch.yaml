_target_: diffusion_policy.workspace.train_diffusion_unet_hybrid_workspace_no_env.TrainDiffusionUnetHybridWorkspaceNoEnv
seed: 42
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:  # Save top k checkpoints
    format_str: epoch={epoch:03d}-val_loss={val_loss:.4f}-val_ddim_mse={val_ddim_mse:.6f}.ckpt
    k: 5
    mode: min
    monitor_key: val_ddim_mse_0
dataloader:
  batch_size: 32
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  shuffle: true
  prefetch_factor: 1
val_dataloader:
  batch_size: 32
  num_workers: 8
  persistent_workers: true
  pin_memory: true
  drop_last: true
  shuffle: true
  prefetch_factor: 1
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0
exp_name: defaults
logging:  # wandb logging configuration
  group: null
  id: null
  name: 2_obs_nut_bolt_human_expert_resnet_scratch
  project: manifeel_diffusion
  resume: false
multi_run:
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_train_diffusion_unet_hybrid_manifeel_2_obs_nut_bolt_human_expert_resnet_scratch
  run_dir: data/outputs/${multi_run.wandb_name_base}
horizon: ${eval:${n_obs_steps} + 14}
n_action_steps: 8
n_obs_steps: 2
shape_meta:
  action:
    shape:
    - 7  # 6D end-effector delta pose + gripper width (m)
  obs:
    agent_pos:
      shape:
      - 7  # eef pose (pos + quat); on disk as "state"
      type: low_dim
    front:
      shape:
      - 256
      - 256
      - 3
      type: rgb
    wrist:
      shape:
      - 256
      - 256
      - 3
      type: rgb
    tactile_force_field_right:
      shape:
      - 10
      - 14
      - 3
      type: tactile
policy:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_targeted_policy.DiffusionUnetHybridImageTargetedPolicy
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  kernel_size: 5
  n_groups: 8
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  past_action_visible: false
  DDPM_noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
    variance_type: fixed_small
  num_DDPM_inference_steps: 100
  num_DDIM_inference_steps: 10
  shape_meta: ${shape_meta}
  obs_encoder:
    # Manifeel-style: torchvision ResNet18 from scratch + GroupNorm + ImageNet
    # input norm, applied to every camera (front + wrist) AND to the tactile
    # force-field grid. No R3M weights anywhere.
    _target_: diffusion_policy.model.vision.r3m_config_util.ResNetTactileHybridObsEncoder
    shape_meta: ${shape_meta}
    pretrained: false       # train ResNet18 from scratch (manifeel's `weights: null`)
    use_groupnorm: true     # replace BN with GroupNorm (manifeel's `use_group_norm: True`)
    freeze_encoder: false
    projection_dim: 128
    # "front" is the fixed scene camera (crop augmentation); "wrist" uses the wrist transform.
    front_camera_keys:
    - front
    # Replace Resize(224) on the wrist with RandomCrop(224)/CenterCrop(224)
    # for train/eval -- matches manifeel's `random_crop: true`.
    wrist_random_crop: true
  inference_loading: false
task:
  dataset:
    _target_: diffusion_policy.dataset.manifeel_dataset.ManifeelImageDataset
    shape_meta: ${shape_meta}
    horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    # We pad before and after the training episode to maximize data usage.
    # Padding before repeats the first observation pad_before times so that the policy can start predicting actions right at the episode's start.
    # Padding after just allows the policy to predict actions past the end of the episode (in this case, loss is measured against the final action repeated pad_after times).
    pad_after: ${eval:${policy.horizon} - 1}
    pad_before: ${eval:${task.dataset.n_obs_steps} - 1}
    seed: ${seed}
    zarr_configs:
    - path: /data/locomotion/michzeng/manifeel/data/nutbolt_quan_July1
      max_train_episodes: null
      sampling_weight: null
      val_ratio: 0.05
  name: manifeel_nut_bolt
  shape_meta: ${shape_meta}
task_name: manifeel
training:
  mixed_precision: bf16
  gradient_clip_val: 1.0
  checkpoint_path: null
  checkpoint_every: 5
  debug: false
  device: cuda
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_train_steps: null
  max_val_steps: null
  total_train_steps: 50000
  num_epochs: null
  resume: false
  rollout_every: 5 # UNUSED -- no environment rollouts during training
  sample_every: ${training.checkpoint_every}
  seed: ${seed}
  tqdm_interval_sec: 30.0
  use_ema: true
  val_every: 1
  log_val_mse: true
  eval_mse_DDPM: true
  eval_mse_DDIM: true
optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06
