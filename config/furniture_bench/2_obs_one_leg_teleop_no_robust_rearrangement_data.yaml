_target_: diffusion_policy.workspace.train_diffusion_unet_hybrid_workspace_no_env.TrainDiffusionUnetHybridWorkspaceNoEnv
seed: 42
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:  # Save top k checkpoints
    format_str: epoch={epoch:03d}-val_loss={val_loss:.4f}-val_ddim_mse={val_ddim_mse:.6f}.ckpt
    k: 7
    mode: min
    monitor_key: val_ddim_mse_0
dataloader:
  batch_size: 48
  num_workers: 8
  persistent_workers: True
  pin_memory: true
  shuffle: true
  prefetch_factor: 1
val_dataloader:
  batch_size: 48
  num_workers: 8
  persistent_workers: True
  pin_memory: true
  drop_last: true  # Drop the last batch if it's not full
  shuffle: true
  prefetch_factor: 1
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0
exp_name: defaults
logging:  # wandb logging configuration
  group: null
  id: null
  name: furniture_bench_2_obs_one_leg_teleop_no_robust_rearrangement_data
  project: furniture_bench_one_leg
multi_run:
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_train_diffusion_unet_hybrid_furniture_bench_2_obs_one_leg_teleop_no_robust_rearrangement_data
  run_dir: data/outputs/${multi_run.wandb_name_base}
horizon: ${eval:${n_obs_steps} + 14}
n_action_steps: 8  # Inference-only parameter
n_obs_steps: 2  # Number of observation steps to condition on
shape_meta:
  action:
    shape:
    - 10
  obs:
    color_image1:
      shape:
      - 3
      - 224
      - 224
      type: rgb
    color_image2:
      shape:
      - 3
      - 224
      - 224
      type: rgb
    robot_state:
      shape:
      - 16
      type: low_dim
policy:  # Parameters to be passed to policy (i.e. the _target_ policy class below)
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_targeted_policy.DiffusionUnetHybridImageTargetedPolicy
  crop_shape:
  - 212
  - 212
  diffusion_step_embed_dim: 128
  down_dims:
  - 256
  - 512
  - 1024
  kernel_size: 5  # kernel size (in time-dimension) for 1D convolutions in UNet
  n_groups: 8  # Number of groups for group norm
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  past_action_visible: false  # explicitely condition on past actions
  DDPM_noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
    variance_type: fixed_small
  num_DDPM_inference_steps: 100  # DDPM scheduler is used during training/validation
  num_DDIM_inference_steps: 10  # DDIM scheduler is used during inference
  use_target_cond: false
  target_dim: null
  shape_meta: ${shape_meta}
  pretrained_encoder: false
  inference_loading: false
task:
  dataset:
    _target_: diffusion_policy.dataset.furniture_bench_dataset.FurnitureBenchDataset
    shape_meta: ${shape_meta}
    horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    # We pad before and after the training episode to maximize data usage.
    # Padding before repeats the first observation pad_before times so that the policy can start predicting actions right at the episode's start.
    # Padding after just allows the policy to predict actions past the end of the episode (in this case, loss is measured against the final action repeated pad_after times).
    pad_after: ${eval:${policy.horizon} - 1}
    pad_before: ${eval:${task.dataset.n_obs_steps} - 1}
    seed: ${seed}
    zarr_configs:
    - path: ../benchmark-furniturebench-juicer/dataset/imitation-juicer-data-processed-001/processed/sim/one_leg/teleop/low/success_truncated_translated.zarr
      max_train_episodes: null
      sampling_weight: null
      val_ratio: 0.0625
    # - path: ../benchmark-furniturebench-juicer/dataset/processed/diffik/sim/one_leg/teleop/low/success_processed_translated.zarr
    #   max_train_episodes: null
    #   sampling_weight: null
    #   val_ratio: 0.0625
    # - path: ../benchmark-furniturebench-juicer/dataset/processed/diffik/sim/one_leg/teleop/med/success.zarr
    #   max_train_episodes: null
    #   sampling_weight: null
    #   val_ratio: 0.0625
  name: furniture_bench
  shape_meta: ${shape_meta} # not used?
task_name: furniture_bench
training:
  mixed_precision: null  # bf16 or null
  gradient_clip_val: 1.0  # max gradient norm; critical for bf16 stability
  checkpoint_path: null
  checkpoint_every: 5
  debug: false
  device: cuda
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_train_steps: null  # per epoch training steps
  max_val_steps: null
  total_train_steps: 800000
  num_epochs: null # 70 for 50, 2000; 200 for 50, 500
  resume: false
  rollout_every: 5  # UNUSED -- no environment rollouts during training
  sample_every: ${training.checkpoint_every}  # validation using DDPM output
  seed: ${seed}
  tqdm_interval_sec: 30.0
  use_ema: true
  val_every: 1
  log_val_mse: true
  eval_mse_DDPM: true
  eval_mse_DDIM: true
optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06